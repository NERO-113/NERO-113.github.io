<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mitarbeiter Portal - Qualifikationsmatrix</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    .loader { border: 3px solid #f3f3f3; border-radius: 50%; border-top: 3px solid #3b82f6; width: 16px; height: 16px; animation: spin 1s linear infinite; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    /* Verstecke die Pfeile in Number-Inputs für ein saubereres Design */
    input[type=number]::-webkit-inner-spin-button, 
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    input[type=number] { -moz-appearance: textfield; }
    
    .custom-scrollbar::-webkit-scrollbar { width: 8px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 8px; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 8px; }
  </style>
</head>
<body class="bg-slate-100 text-slate-800 font-sans min-h-screen flex flex-col items-center py-10 px-4">

  <div class="max-w-md w-full mb-8 text-center relative">
    <div class="inline-flex items-center justify-center bg-blue-600 text-white p-3 rounded-2xl shadow-md mb-4">
      <i data-lucide="shield-check" class="w-8 h-8"></i>
    </div>
    <h1 class="text-2xl font-bold text-slate-900">Mitarbeiter Portal</h1>
    <p class="text-slate-500 mt-1">Qualifikationsmatrix</p>
  </div>

  <div class="max-w-md w-full bg-white rounded-3xl shadow-lg border border-slate-200 overflow-hidden relative">
    
    <div id="loadingOverlay" class="absolute inset-0 bg-white/90 backdrop-blur-sm z-40 flex flex-col items-center justify-center hidden">
      <div class="loader mb-3"></div>
      <span class="font-medium text-slate-600 text-sm" id="loadingText">Lade Daten...</span>
    </div>

    <div id="loginView" class="p-8">
      <h2 class="text-lg font-semibold text-slate-800 mb-6 flex items-center gap-2">
        <i data-lucide="log-in" class="w-5 h-5 text-blue-600"></i> Anmeldung
      </h2>

      <div id="loginError" class="hidden mb-4 p-3 bg-red-50 border border-red-200 text-red-700 text-sm rounded-xl flex items-start gap-2">
        <i data-lucide="alert-circle" class="w-4 h-4 mt-0.5 shrink-0"></i>
        <span id="loginErrorText">Fehler</span>
      </div>

      <div class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1.5">Dein Name</label>
          <select id="userSelect" class="w-full rounded-xl border-slate-300 bg-slate-50 py-3 px-4 text-slate-700 border focus:border-blue-500 focus:bg-white outline-none transition-all cursor-pointer">
            <option value="-1">Bitte auswählen...</option>
            </select>
        </div>

        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1.5">Passwort</label>
          <input type="password" id="passwordInput" placeholder="••••••••" class="w-full rounded-xl border-slate-300 bg-slate-50 py-3 px-4 text-slate-700 border focus:border-blue-500 focus:bg-white outline-none transition-all">
        </div>

        <button onclick="handleLogin()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-3 rounded-xl mt-4 transition-colors shadow-sm flex justify-center items-center gap-2">
          Anmelden
        </button>
      </div>
    </div>


    <div id="editorView" class="hidden flex flex-col h-[70vh]">
      <div class="bg-slate-50 p-6 border-b border-slate-200 flex justify-between items-center shrink-0">
        <div>
          <p class="text-xs text-slate-500 font-medium uppercase tracking-wider mb-1">Angemeldet als</p>
          <h2 class="text-lg font-bold text-slate-800" id="loggedInName">Name</h2>
        </div>
        <button onclick="logout()" class="text-slate-500 hover:text-red-600 transition-colors p-2 bg-white rounded-lg border border-slate-200 shadow-sm" title="Abmelden">
          <i data-lucide="log-out" class="w-4 h-4"></i>
        </button>
      </div>

      <div class="p-6 overflow-y-auto flex-1 custom-scrollbar">
        <p class="text-sm text-slate-600 mb-6 bg-blue-50 p-3 rounded-lg border border-blue-100">
          Trage Werte zwischen <b>1 und 15</b> ein.<br>
          1 = mag ich gar nicht<br>
          15 = mag ich sehr<br>
          <i>Hinweis: Der höchste eingetragene Wert wird immer auf 15 skaliert, der Rest ordnet sich lückenlos darunter an.</i>
        </p>
        
        <div id="editorFields" class="space-y-3">
          </div>
      </div>
      
      <div class="p-6 border-t border-slate-200 bg-white shrink-0">
        <button id="saveBtn" onclick="saveData()" class="w-full bg-green-600 hover:bg-green-700 text-white font-medium py-3 rounded-xl transition-colors shadow-sm flex justify-center items-center gap-2">
          <i data-lucide="save" class="w-5 h-5"></i>
          <span id="saveBtnText">Änderungen speichern</span>
        </button>
      </div>
    </div>

  </div>

  <script>
    function refreshIcons() { if (typeof lucide !== 'undefined') lucide.createIcons(); }

    let categories = [];
    let employeeData = [];
    let currentUser = null;
    let currentUserIndex = -1;

    // DEINE FEST EINGETRAGENE URL:
    const DEFAULT_URL = "https://script.google.com/macros/s/AKfycbw0LCf0Wkx8XFRFte5opWeG19JQx1NqELRbWzTv-YmK5jLmjdWHHlRnFUUSBXm0RVVj/exec"; 

    window.onload = () => {
      refreshIcons();
      fetchDataFromDrive();
      
      document.getElementById('passwordInput').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') handleLogin();
      });
    };

    // --- UI HELPER ---
    function showLoader(text) { 
      document.getElementById('loadingText').innerText = text; 
      document.getElementById('loadingOverlay').classList.remove('hidden'); 
    }
    function hideLoader() { document.getElementById('loadingOverlay').classList.add('hidden'); }
    
    function showLoginError(msg) {
      const errDiv = document.getElementById('loginError');
      errDiv.classList.remove('hidden');
      document.getElementById('loginErrorText').innerText = msg;
    }
    function hideLoginError() { document.getElementById('loginError').classList.add('hidden'); }

    // --- DATEN LADEN ---
    async function fetchDataFromDrive() {
      showLoader("Lade Mitarbeiterdaten...");
      hideLoginError();
      
      try {
        const response = await fetch(DEFAULT_URL, { method: 'GET', redirect: 'follow' });
        if (!response.ok) throw new Error("Netzwerkfehler");
        const sheetData = await response.json();
        
        if (sheetData && sheetData.length > 0) {
          categories = sheetData[0].slice(2); 
          employeeData = [];
          
          for (let i = 1; i < sheetData.length; i++) {
            if (!sheetData[i][1]) continue; 
            employeeData.push({
              password: sheetData[i][0].toString(),
              name: sheetData[i][1],
              scores: sheetData[i].slice(2).map(val => val === "" ? 1 : parseInt(val) || 1)
            });
          }
          populateDropdown();
        }
      } catch(e) {
        console.error(e);
        showLoginError("Verbindung fehlgeschlagen. Bitte überprüfe deine Internetverbindung.");
      } finally {
        hideLoader();
      }
    }

    function populateDropdown() {
      const select = document.getElementById('userSelect');
      select.innerHTML = '<option value="-1">Bitte auswählen...</option>';
      
      const sortedData = [...employeeData].sort((a, b) => a.name.localeCompare(b.name));
      sortedData.forEach(emp => {
        const originalIndex = employeeData.findIndex(e => e.name === emp.name);
        const opt = document.createElement('option');
        opt.value = originalIndex;
        opt.innerText = emp.name;
        select.appendChild(opt);
      });
    }

    // --- LOGIN LOGIK ---
    function handleLogin() {
      hideLoginError();
      const selectVal = document.getElementById('userSelect').value;
      const passVal = document.getElementById('passwordInput').value.trim();

      if (selectVal === "-1") return showLoginError("Bitte wähle zuerst deinen Namen aus.");
      if (!passVal) return showLoginError("Bitte gib dein Passwort ein.");

      const index = parseInt(selectVal);
      const user = employeeData[index];

      if (user.password === passVal) {
        currentUserIndex = index;
        currentUser = user;
        document.getElementById('passwordInput').value = ''; 
        openEditor();
      } else {
        showLoginError("Falsches Passwort.");
      }
    }

    function logout() {
      currentUser = null;
      currentUserIndex = -1;
      document.getElementById('loginView').classList.remove('hidden');
      document.getElementById('editorView').classList.add('hidden');
      document.getElementById('userSelect').value = "-1";
    }

    // --- EDITOR LOGIK ---
    function openEditor() {
      document.getElementById('loginView').classList.add('hidden');
      document.getElementById('editorView').classList.remove('hidden');
      document.getElementById('loggedInName').innerText = currentUser.name;
      
      const container = document.getElementById('editorFields');
      container.innerHTML = '';

      categories.forEach((cat, catIndex) => {
        const wrapper = document.createElement('div');
        wrapper.className = "flex justify-between items-center bg-white p-3 rounded-xl border border-slate-200 shadow-sm";
        
        const label = document.createElement('label');
        label.className = "text-sm font-medium text-slate-700 w-2/3 pr-2";
        label.innerText = cat;

        const inputContainer = document.createElement('div');
        inputContainer.className = "w-1/3 relative";

        const input = document.createElement('input');
        input.type = "number";
        input.min = "1";
        input.max = "15";
        input.step = "1";
        input.inputMode = "numeric"; 
        
        let currentVal = currentUser.scores[catIndex] || 1;
        if(currentVal < 1) currentVal = 1;
        if(currentVal > 15) currentVal = 15;
        
        input.value = currentVal;
        input.className = "score-input w-full text-center text-lg font-bold rounded-lg border-slate-300 bg-slate-50 py-2 border focus:border-blue-500 focus:bg-white outline-none transition-all text-blue-700";
        
        input.addEventListener('input', (e) => {
          let val = parseInt(e.target.value);
          if (val > 15) e.target.value = 15; 
          if (val < 1) e.target.value = 1;   
          
          currentUser.scores[catIndex] = parseInt(e.target.value) || 1;
          resetSaveButton();
        });

        input.addEventListener('keydown', (e) => {
          if (['e', 'E', '+', '-', '.', ','].includes(e.key)) e.preventDefault();
        });

        inputContainer.appendChild(input);
        wrapper.appendChild(label);
        wrapper.appendChild(inputContainer);
        container.appendChild(wrapper);
      });
      refreshIcons();
    }

    function resetSaveButton() {
      const btn = document.getElementById('saveBtn');
      btn.classList.replace('bg-emerald-500', 'bg-green-600');
      btn.innerHTML = `<i data-lucide="save" class="w-5 h-5"></i> <span id="saveBtnText">Änderungen speichern</span>`;
      refreshIcons();
    }

    // --- GAP CLOSING ALGORITHM (FIXIERT AUF 15) ---
    function closeGaps(scoresArray) {
      // 1. Alle einzigartigen Werte finden und absteigend sortieren
      const uniqueSorted = [...new Set(scoresArray)].sort((a, b) => b - a);
      
      if (uniqueSorted.length === 0) return scoresArray;

      // 2. Mapping erstellen: Der HÖCHSTE WERT wird immer fest auf 15 gesetzt!
      const mapping = {};
      
      uniqueSorted.forEach((val, index) => {
        // Höchster Wert (index 0) = 15
        // Zweithöchster Wert (index 1) = 14, usw.
        mapping[val] = 15 - index;
      });

      // 3. Neue lückenlose Werte anwenden
      return scoresArray.map(val => mapping[val]);
    }

    async function saveData() {
      if (!currentUser) return;
      
      const btn = document.getElementById('saveBtn');
      
      btn.innerHTML = `<div class="loader w-5 h-5 border-white border-t-white/30"></div> <span>Speichere...</span>`;
      btn.classList.add('opacity-80', 'cursor-not-allowed');

      // --- WENDE LÜCKENSCHLIESSER AN ---
      currentUser.scores = closeGaps(currentUser.scores);

      // Aktualisiere die UI-Inputs sofort
      const inputs = document.querySelectorAll('.score-input');
      inputs.forEach((input, index) => {
        input.value = currentUser.scores[index];
      });

      try {
        const response = await fetch(DEFAULT_URL, {
          method: 'POST',
          redirect: 'follow',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body: JSON.stringify({
            password: currentUser.password,
            name: currentUser.name,
            scores: currentUser.scores
          })
        });
        
        const result = await response.json();
        
        if (result.status === "success") {
          btn.classList.replace('bg-green-600', 'bg-emerald-500');
          btn.innerHTML = `<i data-lucide="check-circle" class="w-5 h-5"></i> <span>Erfolgreich gespeichert!</span>`;
        } else {
          throw new Error(result.message);
        }
      } catch(e) {
        console.error("Speichern Fehler", e);
        alert("Fehler beim Speichern. Bitte überprüfe deine Internetverbindung.");
        resetSaveButton();
      } finally {
        refreshIcons();
        setTimeout(() => {
          if (currentUser) resetSaveButton();
        }, 3000);
      }
    }
  </script>
</body>
</html>
